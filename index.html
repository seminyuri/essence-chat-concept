<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Суть ✕ Чат</title>
<meta name="description" content="Суть ✕ Чат — внутренний мессенджер экосистемы. Концепт-прототип.">
<script>
  /* theme-init IIFE — set before CSS to avoid FOUC. Deep-link ?theme overrides. */
  (function(){
    try{
      var p=new URLSearchParams(location.search);
      var t=p.get('theme')||localStorage.getItem('the-essence:theme')||
        (matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
      if(t==='dark') document.documentElement.setAttribute('data-theme','dark');
      var org=p.get('ws')||localStorage.getItem('sut-chat:org')||'sut';
      if(org!=='sut') document.documentElement.setAttribute('data-org',org);
    }catch(e){}
  })();
</script>
<link rel="stylesheet" href="assets/essence.css">
<link rel="stylesheet" href="assets/shell.css">

</head>
<body>

<div class="chat-app">
  <!-- ═══════════════════════ TOP BAR (shell) ═══════════════════════ -->
  <header class="shell-topbar">
    <a class="shell-topbar__brand" href="?">
      <span class="shell-topbar__mark"></span>
      <span class="shell-topbar__name">Суть <span class="shell-topbar__x">✕</span> <span class="shell-topbar__module">Чат</span></span>
    </a>
    <button class="shell-search" id="globalSearch">
      <svg class="icon icon--sm"><use href="#i-search"/></svg>
      <span class="shell-search__placeholder">Поиск по чатам, людям, сообщениям…</span>
      <span class="shell-search__kbd">⌘K</span>
    </button>
    <div class="shell-topbar__right">
      <button class="shell-icon-btn" id="themeToggle" title="Тема" aria-label="Переключить тему">
        <svg class="icon shell-icon-btn__sun"><use href="#i-sun"/></svg>
        <svg class="icon shell-icon-btn__moon"><use href="#i-moon"/></svg>
      </button>
      <button class="shell-icon-btn" id="bellBtn" title="Уведомления"><svg class="icon"><use href="#i-bell"/></svg></button>
      <button class="shell-avatar" title="Профиль" id="meAvatar">ЮС</button>
    </div>
  </header>

  <!-- ═══════════════════════ BODY ═══════════════════════ -->
  <div class="chat-body" id="chatBody" data-mobile="list">

    <!-- ─── chat list ─── -->
    <aside class="chat-list">
      <div class="chat-list__head">
        <div class="chat-ws" id="wsSwitch">
          <button class="chat-ws__btn" id="wsBtn">
            <span class="chat-ws__logo" id="wsLogo">СД</span>
            <span class="chat-ws__info">
              <span class="chat-ws__name" id="wsName">Суть Души</span>
              <span class="chat-ws__sub" id="wsSub">12 чатов · 4 непрочитанных</span>
            </span>
            <svg class="icon icon--sm chat-ws__chev"><use href="#i-chev-d"/></svg>
          </button>
          <div class="chat-ws__menu hidden" id="wsMenu"></div>
        </div>
        <div class="chat-list__tools">
          <label class="chat-search">
            <svg class="icon icon--sm"><use href="#i-search"/></svg>
            <input id="listSearch" type="text" placeholder="Поиск">
          </label>
          <button class="chat-newbtn" id="newChatBtn" title="Новый чат"><svg class="icon icon--sm"><use href="#i-pen"/></svg></button>
        </div>
      </div>
      <nav class="chat-folders" id="folders"></nav>
      <div class="chat-list__scroll" id="chatList"></div>
    </aside>

    <!-- ─── conversation ─── -->
    <main class="chat-main" id="chat-main"></main>

    <!-- ─── info panel ─── -->
    <aside class="chat-info" id="infoPanel" hidden></aside>

    <!-- ─── cross-module app-rail (shell) ─── -->
    <nav class="shell-apprail">
      <a class="shell-apprail__item" title="Главная"><svg class="icon"><use href="#i-sparkles"/></svg><span class="shell-apprail__tip">Обзор</span></a>
      <a class="shell-apprail__item" title="Почта"><svg class="icon"><use href="#i-file"/></svg><span class="shell-apprail__tip">Почта</span></a>
      <a class="shell-apprail__item" title="Задачи"><svg class="icon"><use href="#i-check"/></svg><span class="shell-apprail__tip">Задачи</span></a>
      <a class="shell-apprail__item" title="Календарь"><svg class="icon"><use href="#i-cal"/></svg><span class="shell-apprail__tip">Календарь</span></a>
      <a class="shell-apprail__item is-active" title="Чат"><svg class="icon"><use href="#i-message"/></svg><span class="shell-apprail__tip">Чат</span></a>
      <span class="shell-apprail__spacer"></span>
      <a class="shell-apprail__item" title="Настройки"><svg class="icon"><use href="#i-cog"/></svg><span class="shell-apprail__tip">Настройки</span></a>
    </nav>
  </div>
</div>

<!-- overlay mount points -->
<div id="overlays"></div>

<script src="assets/app.js"></script>
</body>
</html>
